name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - master
      - main

jobs:
  deploy-sveltia-auth:
    if: ${{ secrets.SVELTIA_GITHUB_CLIENT_ID != '' && secrets.SVELTIA_GITHUB_CLIENT_SECRET != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Sveltia CMS Authenticator Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          workingDirectory: workers/sveltia-cms-auth
          command: deploy
          secrets: |
            GITHUB_CLIENT_ID
            GITHUB_CLIENT_SECRET
        env:
          GITHUB_CLIENT_ID: ${{ secrets.SVELTIA_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.SVELTIA_GITHUB_CLIENT_SECRET }}

  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Inject Sveltia auth base_url (optional)
        env:
          SVELTIA_AUTH_BASE_URL: ${{ vars.SVELTIA_AUTH_BASE_URL }}
        run: node scripts/inject-sveltia-auth-url.mjs

      - run: npm run build

      - name: Ensure Cloudflare Pages project exists
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: pages project create dsf-docs --production-branch=${{ github.ref_name }}

      - name: Deploy
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: pages deploy dist --project-name=dsf-docs --branch ${{ github.ref_name }} --commit-dirty=true
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
