# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json
#
# DSF Docs — Sveltia CMS（Decap 後継）
# GitHub OAuth: https://sveltiacms.app/en/docs/backends/github
# Netlify 仲介を使う場合、GitHub OAuth App の callback は https://api.netlify.com/auth/done
#
# ローカル編集: https://sveltiacms.app/en/docs/workflows/local （ブラウザのローカルワークフロー）

backend:
  name: github
  repo: tetsuji-d/dsf-docs
  branch: master
  base_url: https://api.netlify.com
  auth_endpoint: auth

site_url: https://docs.dsf.ink
display_url: https://docs.dsf.ink

# Sveltia: ネストした Decap 互換 collection は未対応のため、guides / reference を分割しています。
media_folder: public/uploads
public_folder: /uploads

collections:
  - name: site_sidebar
    label: サイドバー JA/EN
    files:
      - name: sidebar
        label: ナビゲーション構成
        file: src/config/sidebar.config.json
        fields:
          - label: グループ
            name: groups
            widget: list
            fields:
              - { label: グループ名（日本語）, name: labelJa, widget: string }
              - { label: Group title（English）, name: labelEn, widget: string }
              - label: autogenerate（フォルダ自動列挙）
                name: autogenerate
                widget: object
                required: false
                collapsed: true
                fields:
                  - { label: directory（例 reference）, name: directory, widget: string, required: false }
              - label: 手動メニュー項目（slug 指定）
                name: items
                widget: list
                required: false
                fields:
                  - { label: slug（例 guides/start）, name: slug, widget: string }
                  - { label: 表示名（JA）, name: labelJa, widget: string }
                  - { label: Label（EN）, name: labelEn, widget: string }

  - name: docs_ja_guides
    label: ページ（日本語）/ ガイド
    folder: src/content/docs/ja/guides
    slug: '{{fields._slug}}'
    extension: md
    format: frontmatter
    preview_path: '/ja/guides/{{slug}}/'
    fields:
      - { label: タイトル, name: title, widget: string }
      - { label: 説明, name: description, widget: string, required: false }
      - { label: 本文, name: body, widget: markdown }

  - name: docs_ja_reference
    label: ページ（日本語）/ リファレンス
    folder: src/content/docs/ja/reference
    slug: '{{fields._slug}}'
    extension: md
    format: frontmatter
    preview_path: '/ja/reference/{{slug}}/'
    fields:
      - { label: タイトル, name: title, widget: string }
      - { label: 説明, name: description, widget: string, required: false }
      - { label: 本文, name: body, widget: markdown }

  - name: docs_en_guides
    label: Pages (English) / Guides
    folder: src/content/docs/en/guides
    slug: '{{fields._slug}}'
    extension: md
    format: frontmatter
    preview_path: '/en/guides/{{slug}}/'
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: string, required: false }
      - { label: Body, name: body, widget: markdown }

  - name: docs_en_reference
    label: Pages (English) / Reference
    folder: src/content/docs/en/reference
    slug: '{{fields._slug}}'
    extension: md
    format: frontmatter
    preview_path: '/en/reference/{{slug}}/'
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: string, required: false }
      - { label: Body, name: body, widget: markdown }
